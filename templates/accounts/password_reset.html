{% extends 'base.html' %}

{% block title %}Reset Password - SimpleVote{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 0 auto;">
    <section class="auth-card">
        <h1 style="margin-bottom: 10px;">Reset your password</h1>
        <p style="margin-bottom: 20px;">Enter the email address tied to your account and we’ll send reset instructions.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.email.label_tag }}
            {{ form.email }}
            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Send reset link</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
