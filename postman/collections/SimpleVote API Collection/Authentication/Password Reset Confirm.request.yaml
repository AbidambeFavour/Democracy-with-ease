$kind: http-request
name: Password Reset Confirm (POST)
description: |-
  Submit a new password using the reset link token. Replace `{{uidb64}}` and `{{token}}` with the values from the password reset email link.
  Example link format: /accounts/password-reset-confirm/Mg/abc123-xyz/
url: '{{baseUrl}}/accounts/password-reset-confirm/{{uidb64}}/{{token}}/'
method: POST
headers:
  - key: Content-Type
    value: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: new_password1
      value: newSecurePassword123
      description: New password
    - key: new_password2
      value: newSecurePassword123
      description: New password confirmation (must match new_password1)
order: 8000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // With a valid token: redirects to complete page (302)
      // With an invalid/expired token: renders the form again with an error (200)
      pm.test("Password reset confirm returns 200 or 302", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      if (pm.response.code === 200) {
          pm.test("No server error on confirm page", function () {
              const body = pm.response.text();
              pm.expect(body).to.not.include("500");
              pm.expect(body).to.not.include("Server Error");
          });
      }
