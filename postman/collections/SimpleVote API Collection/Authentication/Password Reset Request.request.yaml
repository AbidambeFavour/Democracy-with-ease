$kind: http-request
name: Password Reset Request (POST)
description: Submit an email address to trigger a password reset email. Django will send a reset link to the provided address if an account exists.
url: '{{baseUrl}}/accounts/password-reset/'
method: POST
headers:
  - key: Content-Type
    value: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: email
      value: '{{email}}'
      description: Email address associated with the account (set via environment variable)
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Django always redirects to the "done" page after this form (302),
      // regardless of whether the email exists — to prevent user enumeration
      pm.test("Password reset request redirects to done page (302)", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      // If the form re-renders (200), check for no server error
      if (pm.response.code === 200) {
          pm.test("No server error on password reset page", function () {
              const body = pm.response.text();
              pm.expect(body).to.not.include("500");
              pm.expect(body).to.not.include("Server Error");
          });
      }
