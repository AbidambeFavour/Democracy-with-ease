$kind: http-request
name: Register (GET)
description: Load the user registration page. Use this to confirm the form renders correctly before submitting.
url: '{{baseUrl}}/accounts/register/'
method: GET
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Registration page loads successfully (200)", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is HTML", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
      });

      pm.test("Registration form fields are present", function () {
          const body = pm.response.text();
          pm.expect(body).to.include("form");
          pm.expect(body).to.include("username");
          pm.expect(body).to.include("password");
      });
