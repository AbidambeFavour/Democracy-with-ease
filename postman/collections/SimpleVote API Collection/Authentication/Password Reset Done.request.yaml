$kind: http-request
name: Password Reset Done
description: Confirmation page shown after a password reset email has been sent. This is a GET-only informational page.
url: '{{baseUrl}}/accounts/password-reset/done/'
method: GET
order: 7000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Password reset done page loads (200)", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is HTML", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
      });

      pm.test("Page contains reset confirmation content", function () {
          const body = pm.response.text();
          // Page should mention email or password reset
          pm.expect(body.toLowerCase()).to.satisfy(function (b) {
              return b.includes("email") || b.includes("password") || b.includes("reset");
          });
      });
