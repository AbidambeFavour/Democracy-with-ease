$kind: http-request
name: Password Reset Complete
description: Informational page shown after a password has been successfully reset. No form submission required.
url: '{{baseUrl}}/accounts/password-reset-complete/'
method: GET
order: 9000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Password reset complete page loads (200)", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is HTML", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
      });

      pm.test("Page contains completion content", function () {
          const body = pm.response.text();
          pm.expect(body.toLowerCase()).to.satisfy(function (b) {
              return b.includes("password") || b.includes("complete") || b.includes("login");
          });
      });
