$kind: http-request
name: List Polls
description: Retrieve the list of all polls. Supports optional query parameters for filtering by category, search term, and status.
url: '{{baseUrl}}/voting/'
method: GET
queryParams:
  - key: category
    value: Technology
    description: Filter polls by category slug — e.g. Technology, Sports (optional)
    disabled: true
  - key: search
    value: programming
    description: Search polls by keyword in title or description (optional)
    disabled: true
  - key: status
    value: active
    description: 'Filter by poll status: active, ended, or upcoming (optional)'
    disabled: true
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Poll list page loads successfully (200)", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is HTML", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test("Poll list page contains expected content", function () {
          const body = pm.response.text();
          pm.expect(body).to.include("<html");
          // Page should reference polls or voting
          pm.expect(body.toLowerCase()).to.satisfy(function (b) {
              return b.includes("poll") || b.includes("vote") || b.includes("voting");
          });
      });
