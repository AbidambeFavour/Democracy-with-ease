$kind: http-request
name: Edit Profile (GET)
description: Load the profile edit form for the currently authenticated user. Requires login.
url: '{{baseUrl}}/accounts/profile/'
method: GET
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Authenticated: renders edit profile form (200)
      // Unauthenticated: redirects to login (302)
      pm.test("Edit profile form returns 200 or 302", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });

      if (pm.response.code === 200) {
          pm.test("Response is HTML", function () {
              pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
          });

          pm.test("Edit profile form fields are present", function () {
              const body = pm.response.text();
              pm.expect(body).to.include("form");
              pm.expect(body.toLowerCase()).to.satisfy(function (b) {
                  return b.includes("first_name") || b.includes("email") || b.includes("profile");
              });
          });
      }
