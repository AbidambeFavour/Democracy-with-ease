$kind: http-request
name: Toggle Online Status
description: AJAX endpoint that updates the current user's `last_seen` timestamp to track online status. Requires login. Typically called by the frontend on page load or at intervals. Returns a JSON response.
url: '{{baseUrl}}/accounts/toggle-online/'
method: POST
headers:
  - key: X-Requested-With
    value: XMLHttpRequest
    description: Marks the request as an AJAX call as expected by the Django view
order: 7000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Authenticated POST: returns JSON {"status": "success"} with 200
      // Unauthenticated: redirects to login (302)
      // Wrong method (GET): returns JSON {"status": "error"} with 400
      pm.test("Toggle online status returns 200, 302, or 400", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 400]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });

      if (pm.response.code === 200) {
          pm.test("Response is JSON", function () {
              pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
          });

          pm.test("JSON body has status field", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("status");
          });

          pm.test("Status is 'success'", function () {
              const json = pm.response.json();
              pm.expect(json.status).to.eql("success");
          });
      }
