$kind: http-request
name: Accounts Landing (explicit route)
description: Explicit landing page route. Functionally identical to /accounts/ — useful for testing both URL aliases resolve correctly.
url: '{{baseUrl}}/accounts/landing/'
method: GET
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Both /accounts/ and /accounts/landing/ should behave identically
      pm.test("Explicit landing route returns 200 or 302", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });

      if (pm.response.code === 200) {
          pm.test("Response is HTML", function () {
              pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
          });
      }
