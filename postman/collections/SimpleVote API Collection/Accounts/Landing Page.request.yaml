$kind: http-request
name: Accounts Landing
description: Landing page for unauthenticated users. Authenticated users are redirected to their dashboard automatically.
url: '{{baseUrl}}/accounts/'
method: GET
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Unauthenticated: renders landing page (200)
      // Authenticated: redirects to dashboard (302)
      pm.test("Landing page returns 200 or 302", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302]);
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      });

      if (pm.response.code === 200) {
          pm.test("Response is HTML", function () {
              pm.expect(pm.response.headers.get("Content-Type")).to.include("text/html");
          });

          pm.test("Landing page contains expected content", function () {
              const body = pm.response.text();
              pm.expect(body).to.include("<html");
          });
      }
